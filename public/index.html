<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Warehouse System- 登入</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <h2>Warehouse System</h2>
        <form id="loginForm">
            <div class="input-group">
                <label>登入帳號</label>
                <input type="text" id="loginName" required placeholder="輸入 loginName">
            </div>
            <div class="input-group">
                <label>密碼</label>
                <input type="password" id="password" required placeholder="輸入密碼">
            </div>
            <button type="submit">登入</button>
            <p id="message"></p>
        </form>
    </div>
    <script src="login.js"></script>
</body>
</html>
